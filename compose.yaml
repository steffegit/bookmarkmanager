services:
  backend:
    container_name: bookmarkmanager-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      JDBC_URL: "jdbc:postgresql://db:5432/bookmarkmanager"
      JWT_SECRET: "jwt_secret"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY}"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  db:
    container_name: bookmarkmanager-postgres
    image: postgres
    volumes:
      - ./tmp/db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bookmarkmanager
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
  redis:
    container_name: bookmarkmanager-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 1s
      timeout: 3s
      retries: 5
  web:
    container_name: bookmarkmanager-web
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
